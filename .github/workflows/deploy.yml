name: ЁЯЪА Arsenal Deployer - Build & Deploy to Azure

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - development
          - staging
          - production

# Required for OIDC federated-credential login to Azure
permissions:
  id-token: write
  contents: read

env:
  AZURE_RG: arsenal-platform-rg
  AZURE_LOCATION: eastus
  CONTAINER_NAME: arsenal-deployer
  ACR_NAME: arsenaldeployer
  IMAGE_NAME: arsenal

jobs:
  # =============================================================================
  # JOB 1: Build & Test
  # =============================================================================
  build-and-test:
    runs-on: ubuntu-latest
    name: ЁЯФи Build & Test

    steps:
      - name: ЁЯУе Checkout code
        uses: actions/checkout@v4

      - name: ЁЯРН Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: ЁЯУж Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest flake8

      - name: ЁЯФН Lint code
        run: flake8 app.py --max-line-length=120 --ignore=E501,W503

      - name: ЁЯзк Run tests
        run: |
          mkdir -p tests
          echo "# Placeholder for tests" > tests/test_placeholder.py
          pytest tests/ -v || true

      - name: ЁЯР│ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ЁЯФи Build Docker image (test)
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:test .
          docker images ${{ env.IMAGE_NAME }}:test

  # =============================================================================
  # JOB 2: Push to Azure Container Registry
  # =============================================================================
  push-to-acr:
    runs-on: ubuntu-latest
    name: ЁЯУд Push to ACR
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: ЁЯУе Checkout code
        uses: actions/checkout@v4

      - name: ЁЯФР Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ЁЯФР Login to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: ЁЯП╖я╕П Set image tags
        id: tags
        run: |
          echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "build_num=${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: ЁЯФи Build and push to ACR
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:build-${{ steps.tags.outputs.build_num }} \
            .

          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:build-${{ steps.tags.outputs.build_num }}

      - name: ЁЯУЛ Output image details
        run: |
          echo "тЬЕ Images pushed successfully:"
          echo "   - ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.tags.outputs.sha }}"
          echo "   - ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          echo "   - ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:build-${{ steps.tags.outputs.build_num }}"

  # =============================================================================
  # JOB 3: Deploy to Azure Container Instance
  # =============================================================================
  deploy-to-aci:
    runs-on: ubuntu-latest
    name: ЁЯЪА Deploy to Azure
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.app_url }}

    steps:
      - name: ЁЯУе Checkout code
        uses: actions/checkout@v4

      - name: ЁЯФР Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ЁЯПЧя╕П Create Resource Group (if not exists)
        run: |
          az group create \
            --name ${{ env.AZURE_RG }} \
            --location ${{ env.AZURE_LOCATION }} \
            --tags "project=arsenal" "managed-by=github-actions" \
            --output none || true

      - name: ЁЯФС Get ACR credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: ЁЯЪА Deploy to Azure Container Instance
        id: deploy
        env:
          # Pass via env so bash doesn't expand $ characters in the bcrypt hash.
          # Inside the run script, reference these as "$VAR" тАФ no further expansion happens.
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ARSENAL_USERNAME: ${{ secrets.ARSENAL_USERNAME }}
          ARSENAL_PASSWORD_HASH: ${{ secrets.ARSENAL_PASSWORD_HASH }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DNS_LABEL="arsenal-${{ github.run_id }}"

          az container create \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.CONTAINER_NAME }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            --registry-login-server ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username ${{ steps.acr-creds.outputs.username }} \
            --registry-password ${{ steps.acr-creds.outputs.password }} \
            --dns-name-label $DNS_LABEL \
            --ports 8080 \
            --cpu 2 \
            --memory 4 \
            --os-type Linux \
            --restart-policy Always \
            --assign-identity '[system]' \
            --environment-variables \
              AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
              ARSENAL_ENV=${{ github.event.inputs.environment || 'production' }} \
              ARSENAL_VERSION=${{ github.sha }} \
              GITHUB_SHA=${{ github.sha }} \
            --secure-environment-variables \
              "SECRET_KEY=$SECRET_KEY" \
              "ARSENAL_USERNAME=$ARSENAL_USERNAME" \
              "ARSENAL_PASSWORD_HASH=$ARSENAL_PASSWORD_HASH" \
              "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY" \
            --output none

          # Grant the container's managed identity Contributor on the subscription
          # so it can create resource groups and resources for user deployments.
          # Requires the GitHub SP to have "User Access Administrator" on the subscription.
          PRINCIPAL_ID=$(az container show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query identity.principalId \
            --output tsv)

          echo "Container managed identity principalId: $PRINCIPAL_ID"

          # Retry-with-backoff role assignment.
          # AAD principals take time to propagate after creation, so the first
          # attempt often fails with "PrincipalNotFound" тАФ retry a few times.
          assign_role() {
            local principal=$1
            local scope=$2
            local role=$3
            local err_file
            err_file=$(mktemp)

            for attempt in 1 2 3 4 5 6; do
              if az role assignment create \
                   --assignee-object-id "$principal" \
                   --assignee-principal-type ServicePrincipal \
                   --role "$role" \
                   --scope "$scope" \
                   --output none 2>"$err_file"; then
                echo "тЬУ Role '$role' granted on attempt $attempt."
                rm -f "$err_file"
                return 0
              fi

              # "Already exists" is success тАФ the SP already has this exact role here.
              if grep -qiE "already exists|RoleAssignmentExists|conflict" "$err_file"; then
                echo "тЬУ Role '$role' already assigned (idempotent)."
                rm -f "$err_file"
                return 0
              fi

              # AuthorizationFailed = the GitHub SP itself doesn't have permission
              # to create role assignments. URA grant is missing тАФ fail loudly.
              if grep -qiE "AuthorizationFailed" "$err_file"; then
                echo "::error::GitHub SP lacks permission to assign roles."
                echo "::error::Grant 'User Access Administrator' on the subscription"
                echo "::error::to the SP whose clientId is in AZURE_CLIENT_ID. See README."
                cat "$err_file"
                rm -f "$err_file"
                return 1
              fi

              echo "Attempt $attempt failed (likely AAD propagation):"
              cat "$err_file"
              if [ $attempt -lt 6 ]; then
                local delay=$((attempt * 10))
                echo "Retrying in ${delay}s..."
                sleep $delay
              fi
            done

            echo "::error::Role assignment failed after 6 attempts."
            rm -f "$err_file"
            return 1
          }

          assign_role "$PRINCIPAL_ID" "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}" "Contributor"

          FQDN=$(az container show \
            --resource-group ${{ env.AZURE_RG }} \
            --name ${{ env.CONTAINER_NAME }} \
            --query ipAddress.fqdn \
            --output tsv)

          APP_URL="http://${FQDN}:8080"
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT
          echo "fqdn=$FQDN" >> $GITHUB_OUTPUT

          echo ""
          echo "тХФтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХЧ"
          echo "тХС           ЁЯЪА ARSENAL PLATFORM DEPLOYED!                    тХС"
          echo "тХатХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХг"
          echo "тХС  URL:    $APP_URL"
          echo "тХС  FQDN:   $FQDN"
          echo "тХС  Image:  ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"
          echo "тХЪтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХРтХЭ"

      - name: ЁЯзк Health Check
        run: |
          APP_URL="${{ steps.deploy.outputs.app_url }}"
          echo "Waiting for container to start..."
          sleep 30

          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $APP_URL || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "тЬЕ Health check passed! Application is live."
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done

          echo "тЪая╕П Health check did not pass, but deployment completed."
          exit 0

      - name: ЁЯУК Update deployment status
        if: always()
        run: |
          echo "Deployment completed with status: ${{ job.status }}"

  # =============================================================================
  # JOB 4: Deploy to Azure Container Apps (Alternative - Production)
  # =============================================================================
  deploy-to-aca:
    runs-on: ubuntu-latest
    name: ЁЯЪА Deploy to Container Apps
    needs: push-to-acr
    if: github.ref == 'refs/heads/main' && (github.event.inputs.environment == 'production' || github.event.inputs.environment == '')
    environment:
      name: production-aca
      url: ${{ steps.deploy-aca.outputs.app_url }}

    steps:
      - name: ЁЯУе Checkout code
        uses: actions/checkout@v4

      - name: ЁЯФР Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ЁЯзй Install containerapp extension
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az extension add --name containerapp --upgrade --only-show-errors

      - name: ЁЯФС Get ACR credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show --name ${{ env.ACR_NAME }} --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show --name ${{ env.ACR_NAME }} --query "passwords[0].value" -o tsv)
          echo "::add-mask::$ACR_PASSWORD"
          echo "username=$ACR_USERNAME" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASSWORD" >> $GITHUB_OUTPUT

      - name: ЁЯМР Ensure Container Apps environment exists
        run: |
          if ! az containerapp env show \
                 --name arsenal-env \
                 --resource-group ${{ env.AZURE_RG }} >/dev/null 2>&1; then
            echo "Creating Container Apps environment..."
            az containerapp env create \
              --name arsenal-env \
              --resource-group ${{ env.AZURE_RG }} \
              --location ${{ env.AZURE_LOCATION }} \
              --output none
          else
            echo "Container Apps environment already exists."
          fi

      - name: ЁЯЪА Deploy to Azure Container Apps
        id: deploy-aca
        env:
          # Same reason as the ACI step: bcrypt hashes contain $ characters that
          # bash would otherwise expand. Use env vars and quote the references.
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ARSENAL_USERNAME: ${{ secrets.ARSENAL_USERNAME }}
          ARSENAL_PASSWORD_HASH: ${{ secrets.ARSENAL_PASSWORD_HASH }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Deploying image: $IMAGE"

          # Detect existing Container App and its provisioning state.
          EXISTS=false
          PROV_STATE=""
          if az containerapp show \
               --name arsenal-deployer-aca \
               --resource-group ${{ env.AZURE_RG }} >/dev/null 2>&1; then
            EXISTS=true
            PROV_STATE=$(az containerapp show \
              --name arsenal-deployer-aca \
              --resource-group ${{ env.AZURE_RG }} \
              --query properties.provisioningState -o tsv)
            echo "Container App exists, provisioningState=$PROV_STATE"
          fi

          # A Failed resource cannot be updated тАФ wipe it and recreate.
          if [ "$EXISTS" = "true" ] && [ "$PROV_STATE" != "Succeeded" ]; then
            echo "Provisioning state is '$PROV_STATE' тАФ deleting before recreate..."
            az containerapp delete \
              --name arsenal-deployer-aca \
              --resource-group ${{ env.AZURE_RG }} \
              --yes \
              --output none
            EXISTS=false
          fi

          if [ "$EXISTS" = "true" ]; then
            echo "Updating existing Container App..."
            az containerapp registry set \
              --name arsenal-deployer-aca \
              --resource-group ${{ env.AZURE_RG }} \
              --server ${{ env.ACR_NAME }}.azurecr.io \
              --username ${{ steps.acr-creds.outputs.username }} \
              --password ${{ steps.acr-creds.outputs.password }} \
              --output none
            az containerapp update \
              --name arsenal-deployer-aca \
              --resource-group ${{ env.AZURE_RG }} \
              --image $IMAGE \
              --output none
          else
            echo "Creating new Container App..."
            az containerapp create \
              --name arsenal-deployer-aca \
              --resource-group ${{ env.AZURE_RG }} \
              --environment arsenal-env \
              --image $IMAGE \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --registry-username ${{ steps.acr-creds.outputs.username }} \
              --registry-password ${{ steps.acr-creds.outputs.password }} \
              --target-port 8080 \
              --ingress external \
              --cpu 1.0 --memory 2.0Gi \
              --min-replicas 1 --max-replicas 3 \
              --system-assigned \
              --env-vars \
                AZURE_SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID }} \
                AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} \
                ARSENAL_ENV=production \
                ARSENAL_VERSION=${{ github.sha }} \
                "SECRET_KEY=secretref:secret-key" \
                "ARSENAL_USERNAME=secretref:arsenal-username" \
                "ARSENAL_PASSWORD_HASH=secretref:arsenal-password-hash" \
                "ANTHROPIC_API_KEY=secretref:anthropic-api-key" \
              --secrets \
                "secret-key=$SECRET_KEY" \
                "arsenal-username=$ARSENAL_USERNAME" \
                "arsenal-password-hash=$ARSENAL_PASSWORD_HASH" \
                "anthropic-api-key=$ANTHROPIC_API_KEY" \
              --output none
          fi

          # Make sure the app has a system-assigned identity (idempotent).
          az containerapp identity assign \
            --name arsenal-deployer-aca \
            --resource-group ${{ env.AZURE_RG }} \
            --system-assigned \
            --output none

          # Grant Contributor on the subscription so the app can deploy stacks.
          # Requires the GitHub SP to have "User Access Administrator" on the subscription.
          PRINCIPAL_ID=$(az containerapp show \
            --name arsenal-deployer-aca \
            --resource-group ${{ env.AZURE_RG }} \
            --query identity.principalId \
            --output tsv)

          echo "Container App managed identity principalId: $PRINCIPAL_ID"

          # Retry-with-backoff role assignment (same logic as in the ACI job).
          assign_role() {
            local principal=$1
            local scope=$2
            local role=$3
            local err_file
            err_file=$(mktemp)

            for attempt in 1 2 3 4 5 6; do
              if az role assignment create \
                   --assignee-object-id "$principal" \
                   --assignee-principal-type ServicePrincipal \
                   --role "$role" \
                   --scope "$scope" \
                   --output none 2>"$err_file"; then
                echo "тЬУ Role '$role' granted on attempt $attempt."
                rm -f "$err_file"
                return 0
              fi

              if grep -qiE "already exists|RoleAssignmentExists|conflict" "$err_file"; then
                echo "тЬУ Role '$role' already assigned (idempotent)."
                rm -f "$err_file"
                return 0
              fi

              if grep -qiE "AuthorizationFailed" "$err_file"; then
                echo "::error::GitHub SP lacks permission to assign roles."
                echo "::error::Grant 'User Access Administrator' on the subscription"
                echo "::error::to the SP whose clientId is in AZURE_CLIENT_ID. See README."
                cat "$err_file"
                rm -f "$err_file"
                return 1
              fi

              echo "Attempt $attempt failed (likely AAD propagation):"
              cat "$err_file"
              if [ $attempt -lt 6 ]; then
                local delay=$((attempt * 10))
                echo "Retrying in ${delay}s..."
                sleep $delay
              fi
            done

            echo "::error::Role assignment failed after 6 attempts."
            rm -f "$err_file"
            return 1
          }

          assign_role "$PRINCIPAL_ID" "/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}" "Contributor"

          URL=$(az containerapp show \
            --name arsenal-deployer-aca \
            --resource-group ${{ env.AZURE_RG }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "app_url=https://$URL" >> $GITHUB_OUTPUT
          echo "тЬЕ Container Apps URL: https://$URL"

  # =============================================================================
  # JOB 5: Cleanup Old Images
  # =============================================================================
  cleanup:
    runs-on: ubuntu-latest
    name: ЁЯз╣ Cleanup Old Images
    needs: [deploy-to-aci, deploy-to-aca]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: ЁЯФР Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ЁЯЧСя╕П Delete old images (keep last 10)
        run: |
          az acr manifest list-metadata \
            --name ${{ env.IMAGE_NAME }} \
            --registry ${{ env.ACR_NAME }} \
            --orderby time_asc \
            --query "[?tags==null].digest" \
            --output tsv | head -n -10 | while read digest; do
              echo "Deleting untagged manifest: $digest"
              az acr manifest delete \
                --name ${{ env.IMAGE_NAME }}@${digest} \
                --registry ${{ env.ACR_NAME }} \
                --yes || true
            done
